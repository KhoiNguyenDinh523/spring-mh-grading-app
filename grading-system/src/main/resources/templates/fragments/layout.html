<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | MH Solution Grading'">MH Solution Grading</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <!-- ===== SHARED NAVIGATION BAR ===== -->
    <nav th:fragment="navbar">
        <div class="nav-inner">
            <a class="nav-brand" href="/">🎓 MH Solution</a>
            <div class="nav-links">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">Admin Panel</a>
                <a sec:authorize="hasAnyRole('GRADER','ADMIN')" th:href="@{/grader/dashboard}">Grader Panel</a>
                <a sec:authorize="hasRole('APPLICANT')" th:href="@{/applicant/dashboard}">Applicant Panel</a>

                <span sec:authorize="isAuthenticated()" class="nav-user">
                    👤 <span sec:authentication="name">User</span>
                </span>

                <a sec:authorize="isAuthenticated()" th:href="@{/profile/change-password}" class="btn-sm"
                    style="color:#eee; text-decoration: underline; margin-right: 15px;">Change Password</a>

                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- ===== FLASH MESSAGE ALERTS ===== -->
    <div th:fragment="alerts">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    </div>
</body>

</html>
