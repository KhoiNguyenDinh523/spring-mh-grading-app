<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Create User')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="page-header">
            <h1>🆕 Add New User Account</h1>
            <a th:href="@{/admin/users}" class="btn btn-outline">Back to User List</a>
        </div>

        <div class="auth-card" style="max-width: 500px; margin: 2rem auto;">
            <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem;">
                Administrators can create accounts for Applicants or Graders.
                <br><em>Note: You cannot create another Admin account.</em>
            </p>

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <form th:action="@{/admin/users/new}" th:object="${registerRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="john_doe"
                        required>
                    <p class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error</p>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control"
                        placeholder="john@example.com" required>
                    <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</p>
                </div>

                <div class="form-group">
                    <label for="password">Initial Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control"
                        placeholder="••••••••" required>
                    <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</p>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control"
                        placeholder="••••••••" required>
                    <p class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                        Error
                    </p>
                </div>

                <div class="form-group">
                    <label for="role">User Role</label>
                    <select id="role" th:field="*{role}" class="form-control" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ROLE</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>
        </div>
    </main>
</body>

</html>
