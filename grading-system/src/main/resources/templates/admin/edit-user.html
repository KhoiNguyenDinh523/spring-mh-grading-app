<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Edit User')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="page-header">
            <h1>✏️ Edit User: <span th:text="${updateRequest.username}">User</span></h1>
            <a th:href="@{/admin/users}" class="btn btn-outline">Back to List</a>
        </div>

        <div class="auth-card" style="max-width: 500px; margin: 2rem auto;">
            <form th:action="@{/admin/users/{id}/edit(id=${userId})}" th:object="${updateRequest}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required>
                    <p class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error</p>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                    <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Error</p>
                </div>

                <!-- Approach A: Roles are immutable after creation. Admin can only view it. -->
                <div class="form-group">
                    <label for="role">Account Role</label>
                    <div
                        style="padding: 0.6rem; background: var(--gray-100); border-radius: 4px; border: 1px solid var(--gray-300); color: var(--gray-700); font-weight: 500;">
                        <span th:text="${updateRequest.role.name().replace('ROLE_','')}">ROLE</span>
                    </div>
                    <!-- Keep the field for form binding but hidden/locked -->
                    <input type="hidden" th:field="*{role}">
                </div>

                <hr style="margin: 1.5rem 0;">

                <div class="form-group">
                    <label for="newPassword">Force Reset Password (Optional)</label>
                    <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                        placeholder="Leave empty to keep current">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
            </form>
        </div>
    </main>
</body>

</html>
