<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(${assignmentId != null ? 'Edit Assignment' : 'New Assignment'})}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="page-header">
            <h1 th:text="${assignmentId != null ? '📝 Edit Assignment Task' : '🆕 Create New Assignment Task'}">
                Assignment Task</h1>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline">Back to Dashboard</a>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="auth-card" style="margin: 2rem auto;">
            <form
                th:action="@{${assignmentId != null ? '/admin/assignments/' + assignmentId + '/edit' : '/admin/assignments/new'}}"
                th:object="${assignmentRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control"
                        placeholder="e.g., Simple Calculator in Java" required>
                    <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Error</p>
                </div>

                <div class="form-group">
                    <label for="description">Description (Explain the task clearly)</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="8"
                        placeholder="Enter task requirements and instructions here..." required></textarea>
                    <p class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Error</p>
                </div>

                <div class="form-group">
                    <label for="deadline">Deadline</label>
                    <input type="datetime-local" id="deadline" th:field="*{deadline}" class="form-control" required>
                    <p class="error" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}">Error</p>
                </div>

                <div class="form-group">
                    <label for="status">Initial Status</label>
                    <select id="status" th:field="*{status}" class="form-control" required>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">ONGOING</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Save Assignment Task</button>
            </form>
        </div>
    </main>
</body>

</html>
