<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Login')}"></head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-logo">🎓</div>
        <h1 class="auth-title">MH Solution Grading</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <!-- Flash messages from registration or logout -->
        <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
        <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.expired}" class="alert alert-error">Your session has expired. Please log in again.</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <!-- Spring Security CSRF token (Thymeleaf auto-injects this) -->
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username"
                    required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password"
                    required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <p class="auth-footer" style="color: var(--gray-500); font-size: 0.8rem;">
            Accounts must be created by an Administrator.
        </p>
    </div>

</body>

</html>
