<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Grade Solution')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="page-header">
            <h1>📝 Evaluation: <span th:text="${solution.uploader.username}">User</span></h1>
            <a th:href="@{/grader/assignments/{id}(id=${solution.assignment.id})}" class="btn btn-outline">Back to
                Task</a>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="grid" style="display: grid; grid-template-columns: 3fr 2fr; gap: 2rem;">
            <!-- LEFT: Solution Details -->
            <section class="solution-details">
                <div class="card">
                    <h3>Submission Info</h3>
                    <p><strong>Assignment:</strong> <span th:text="${solution.assignment.title}">Task</span></p>
                    <p><strong>Filename:</strong> <span th:text="${solution.originalFilename}">file.pdf</span></p>
                    <p><strong>Submitted:</strong> <span
                            th:text="${#temporals.format(solution.submittedAt, 'dd/MM/yyyy HH:mm')}">Time</span></p>

                    <div style="margin: 1.5rem 0; padding: 1rem; background: #fdf8e6; border-radius: 8px;"
                        th:if="${solution.applicantComment}">
                        <strong>Applicant's Comment:</strong>
                        <p style="margin-top: 5px; font-style: italic;" th:text="${solution.applicantComment}">Comment
                        </p>
                    </div>

                    <a th:href="@{/grader/download/{id}(id=${solution.id})}" class="btn btn-primary btn-block">Download
                        for Review</a>
                </div>
            </section>

            <!-- RIGHT: Grading Form -->
            <section class="grading-form">
                <div class="auth-card" style="margin: 0;">
                    <h3>Submit Evaluation</h3>
                    <form th:action="@{/grader/grade}" th:object="${gradeRequest}" method="post">
                        <!-- 
                             Fixed hidden ID mapping: In GraderController, we set assignmentId as the Solution ID 
                             to reuse the GradeRequest DTO. 
                        -->
                        <input type="hidden" th:field="*{solutionId}">

                        <div class="form-group">
                            <label for="score">Score (0 - 10)</label>
                            <input type="number" id="score" th:field="*{score}" class="form-control" min="0" max="10"
                                step="1" required>
                        </div>

                        <div class="form-group">
                            <label for="comment">Grader's Feedback</label>
                            <textarea id="comment" th:field="*{comment}" class="form-control" rows="6"
                                placeholder="Provide detailed feedback..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block">Save Grade & Feedback</button>
                    </form>
                </div>
            </section>
        </div>
    </main>
</body>

</html>
