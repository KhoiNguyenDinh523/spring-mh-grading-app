<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Upload Assignment')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="page-header">
            <h1>📤 Upload Assignment</h1>
            <a th:href="@{/applicant/dashboard}" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <h2 class="card-title">Select File to Upload</h2>
            <p class="text-muted">Allowed types: PDF, DOC, DOCX, TXT, ZIP · Max size: 10 MB</p>

            <!--
            enctype="multipart/form-data" is REQUIRED for file uploads.
            Without it, the file content won't be sent to the server.
        -->
            <form th:action="@{/applicant/upload}" method="post" enctype="multipart/form-data">
                <!-- Spring Security CSRF token is auto-injected by Thymeleaf for forms -->
                <div class="form-group">
                    <label for="file">Choose File</label>
                    <input type="file" id="file" name="file" class="form-control" accept=".pdf,.doc,.docx,.txt,.zip"
                        required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Upload Assignment</button>
                    <a th:href="@{/applicant/dashboard}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
