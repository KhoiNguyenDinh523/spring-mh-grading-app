<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(${assignment.title})}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="page-header">
            <div>
                <a th:href="@{/admin/dashboard}" style="color: var(--primary); text-decoration: none;">← Back to
                    Dash</a>
                <h1 th:text="${assignment.title}">Title</h1>
                <p style="color: var(--gray);"
                    th:text="'Status: ' + ${assignment.status} + ' | Deadline: ' + ${#temporals.format(assignment.deadline, 'dd/MM/yyyy HH:mm')}">
                </p>
            </div>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <section class="assignment-desc"
            style="background: #fff; padding: 1.5rem; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 2rem;">
            <h3>Task Description</h3>
            <div style="white-space: pre-wrap;" th:text="${assignment.description}">Description</div>
        </section>

        <h2>Solutions Submitted</h2>
        <div th:if="${solutions.empty}" class="empty-state">
            <p>No solutions submitted yet for this task.</p>
        </div>

        <table th:unless="${solutions.empty}" class="table">
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Submitted At</th>
                    <th>Assigned Grader</th>
                    <th>Score</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${solutions}">
                    <td th:text="${s.uploader.username}">User</td>
                    <td th:text="${#temporals.format(s.submittedAt, 'dd/MM/yyyy HH:mm')}">Time</td>
                    <td>
                        <!-- Mode 1: Display Assigned Grader -->
                        <div th:if="${s.assignedGrader != null and not #strings.equals(param.editSolutionId, s.id)}"
                            style="display: flex; align-items: center; gap: 10px;">
                            <span class="badge badge-grader" th:text="${s.assignedGrader.username}">Grader</span>
                            <a th:href="@{/admin/assignments/{id}(id=${assignment.id}, editSolutionId=${s.id})}"
                                style="font-size: 0.75rem; color: var(--primary); text-decoration: underline;">Change</a>
                        </div>

                        <!-- Mode 2: Assign Dropdown (Show if none assigned OR if 'Change' was clicked) -->
                        <form th:if="${s.assignedGrader == null or #strings.equals(param.editSolutionId, s.id)}"
                            th:action="@{/admin/solutions/assign}" method="post" style="display:flex; gap:5px;">
                            <input type="hidden" name="solutionId" th:value="${s.id}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <select name="graderId" class="form-control"
                                style="width: auto; padding: 2px 5px; height: 32px; font-size: 0.85rem;" required>
                                <option value="">-- Select Grader --</option>
                                <option th:each="g : ${graders}" th:value="${g.id}" th:text="${g.username}"
                                    th:selected="${s.assignedGrader != null && s.assignedGrader.id == g.id}">Grader
                                </option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Assign</button>
                            <a th:if="${s.assignedGrader != null}"
                                th:href="@{/admin/assignments/{id}(id=${assignment.id})}" class="btn btn-sm btn-outline"
                                style="padding: 2px 8px;">Cancel</a>
                        </form>
                    </td>
                    <td>
                        <span th:if="${s.score != null}" class="score-badge" th:text="${s.score} + '/10'">-</span>
                        <span th:unless="${s.score != null}" class="badge status-pending">Not Graded</span>
                    </td>
                    <td>
                        <div class="btn-group">
                            <a th:href="@{/applicant/download/{id}(id=${s.id})}"
                                class="btn btn-sm btn-outline">Download</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>

</html>
