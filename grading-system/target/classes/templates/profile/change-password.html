<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Change Password')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <div class="auth-card" style="max-width: 400px; margin: 2rem auto;">
            <h2>🔐 Change Password</h2>
            <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem;">
                Please verify your current password before choosing a new one.
            </p>
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <form th:action="@{/profile/change-password}" th:object="${passwordRequest}" method="post">
                <div class="form-group">
                    <label for="oldPassword">Current Password</label>
                    <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control"
                        placeholder="••••••••" required>
                    <p class="error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}">Error</p>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control"
                        placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}" class="form-control"
                        placeholder="••••••••" required>
                    <p class="error" th:if="${#fields.hasErrors('confirmNewPassword')}"
                        th:errors="*{confirmNewPassword}">Error</p>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Update Password</button>
            </form>
        </div>
    </main>
</body>

</html>
