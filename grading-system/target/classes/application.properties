# ============================================================
# Application Settings
# ============================================================
spring.application.name=grading-system
server.port=8080

# ============================================================
# DataSource / MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/grading_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Admin#@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================================
# File Upload Settings
# ============================================================
# Store files OUTSIDE the web root for security
app.upload.dir=C:\\uploads\\grading
# Max file size: 10 MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Session
# ============================================================
server.servlet.session.timeout=30m

# ============================================================
# Logging
# ============================================================
logging.level.com.mhsolution=INFO
logging.level.org.springframework.security=WARN
