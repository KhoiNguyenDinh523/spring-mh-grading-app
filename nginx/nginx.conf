# =============================================================
# nginx.conf  — MH Solution Reverse Proxy Configuration
# =============================================================
#
# Architecture:
#   abc.com  → Static HTML files served directly by Nginx
#   xyz.com  → Nginx proxies requests to Spring Boot on :8080
#
# This file goes in:  /etc/nginx/nginx.conf   (Linux VM)
# Or include it via:  /etc/nginx/conf.d/mhsolution.conf
# =============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ----------------------------------------------------------
    # Security Headers (applied globally)
    # ----------------------------------------------------------
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # XSS protection hint (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    # Only allow same-origin referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------
    # Hide Nginx version from error pages and headers
    # ----------------------------------------------------------
    server_tokens off;

    # ----------------------------------------------------------
    # Limit request body size (sync with Spring Boot 10 MB limit)
    # ----------------------------------------------------------
    client_max_body_size 11M;

    # ----------------------------------------------------------
    # Logging
    # ----------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ==========================================================
    # UPSTREAM — Spring Boot Grading System
    # ==========================================================
    # If Spring Boot runs on the same VM, use 127.0.0.1:8080
    # If it runs on a different host, replace with that IP.
    upstream grading_app {
        server 127.0.0.1:8080;
        # keepalive: reuse TCP connections to Spring Boot (performance)
        keepalive 32;
    }

    # ==========================================================
    # SERVER BLOCK 1: abc.com — Static Company Website
    # ==========================================================
    server {
        listen 80;
        server_name abc.com www.abc.com;

        # Root: the folder containing index.html for the static site
        # Adjust this path to where you placed mh-solution-static/
        root /var/www/mh-solution-static;
        index index.html;

        # Serve static HTML directly
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ----------------------------------------------------------
        # SECURITY: Block access to hidden files (e.g., .env, .git)
        # ----------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Cache static assets aggressively
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ==========================================================
    # SERVER BLOCK 2: xyz.com — Grading System (Reverse Proxy)
    # ==========================================================
    server {
        listen 80;
        server_name xyz.com www.xyz.com;

        # ----------------------------------------------------------
        # SECURITY: Block direct access to internal/upload folders
        # The upload directory is outside the web root, so Nginx
        # cannot serve it — this is an extra layer for any edge case.
        # ----------------------------------------------------------
        location ~* ^/(uploads|internal|actuator|h2-console) {
            deny all;
            return 403;
        }

        # ----------------------------------------------------------
        # Block common attack paths
        # ----------------------------------------------------------
        location ~* \.(env|git|htaccess|htpasswd|bak|sql|log)$ {
            deny all;
            return 403;
        }

        # ----------------------------------------------------------
        # Main Proxy: forward all requests to Spring Boot
        # ----------------------------------------------------------
        location / {
            proxy_pass         http://grading_app;

            # These headers tell Spring Boot the REAL client IP and protocol
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required for Spring Security session cookie to work behind proxy
            proxy_set_header   X-Forwarded-Host  $host;

            # Timeouts — increase if Spring Boot startup is slow
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Disable buffering for file downloads (stream directly to client)
            proxy_buffering off;

            # Allow HTTP/1.1 keepalive to upstream
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ----------------------------------------------------------
        # Static assets from Spring Boot (served with cache headers)
        # ----------------------------------------------------------
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
            proxy_pass http://grading_app;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ----------------------------------------------------------
        # Custom error pages
        # ----------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/html;
            internal;
        }
    }
}
